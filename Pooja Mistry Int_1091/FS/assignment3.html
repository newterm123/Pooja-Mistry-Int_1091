<html>

<head>
    <title>Assignment 3 - form</title>
</head>

<body>
    <h1>User Registration Form</h1>
    <form action="Submit.html" method="post">
        <fieldset>
        <legend>Personal Info</legend>
        <div>
            <div>
                <label for="Full Name">Full Name</label>
                <input type="text" id="Full Name" name="Full Name" placeholder="FirstName_LastName" required
                    pattern="[A-Za-z]+_[A-Za-z]+" />
            </div>
            <div>
                <label for="About Yourself">About Yourself</label>
                <textarea id="About Yourself" rows="5" cols="50" name="About Yourself"></textarea>
            </div>
            <div>
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required />
            </div>
            <div>
                <label for="Password">Password</label>
                <input type="password" id="Password" name="Password" minlength="8" required />
            </div>
            <div>
                <label for="Phoneno">Phone number</label>
                <input type="tel" id="Phoneno" name="Phoneno" pattern="[0-9]{10}" required />
            </div>
            <div>
                <label for="website">Website</label>
                <input type="url" id="website" name="website" />
            </div>
            <div>
                <label for="Skills">Skills</label>
                <div><input type="checkbox" name="Skills" value="HTML" checked/>HTML</div>
                <div><input type="checkbox" name="Skills" value="CSS" />CSS</div>
                <div><input type="checkbox" name="Skills" value="JavaScript" />JavaScript</div>
            </div>
            <div>
                <label for="Gender">Gender</label>
                <div><input type="radio" name="Gender" value="Male" />Male</div>
                <div><input type="radio" name="Gender" value="Female" checked/>Female</div>
            </div>
            <div>
                <label for="Preferred Color">Preferred Color</label>
                <input type="color" id="Preferred Color" name="Preferred Color" value="#0011ff" />
            </div>
            <div>
                <label for="Experience Level">Experience Level</label>
                <input type="number" id="Experience Level" name="Experience Level" min="0" max="10" step="2" />
            </div>
            <div>
                <label for="Search Interest">Search Interest</label>
                <input type="search" id="Search Interest" name="Search Interest" />
            </div>
            <div>
                <label for="Date of Birth">Date of Birth</label>
                <input type="date" id="Date of Birth" name="Date of Birth" max="2005-12-31"/>
            </div>
            <div>
                <label for="Available Time">Available Time</label>
                <input type="time" id="Available Time" name="Available Time" min="09:00" max="18:30"/>
            </div>
            <div>
                <label for="Joining Month">Joining Month</label>
                <input type="date" id="Joining Month" name="Joining Month" value="2026-01-09"/>
            </div>
            <div>
                <label for="Training Week">Training Week</label>
                <input type="week" id="Training Week" name="Training Week" value="2025-W07" readonly/>
            </div>
            <div>
                <label for="Interview Slot">Interview Slot</label>
                <input type="datetime-local" id="Interview Slot" name="Interview Slot" value="2025-01-09T10:30" />
            </div>
            <div>
                <label for="Technology">Technology</label>
                <select name="Tech" id="Technology">
                    <option value="select">tech</option>
                    <option value=".Net">.Net</option>
                    <option value="Angular">Angular</option>
                    <option value="Java">Java</option>
                    <option value="ReactJS">ReactJS</option>
                    <option value="QA">QA</option>
                </select>
            </div>
            <div>
                <label for="resume">Resume Upload</label>
                <input type="file" id="resume" name="resume" accept=".pdf" />
            </div>
            <div>
                <input type="hidden" name="userId" value="USER12345" />
            </div>
            <div>
                <input type="submit" value="Submit" />
                <input type="reset" value="Reset" />
                <input type="button" value="Click Me"  />
            </div>
        </div>
        </fieldset>
    </form>
</body>

</html>
