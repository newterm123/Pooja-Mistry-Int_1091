<html>

<head>
    <title>HTML Images Practice</title>
</head>

<body>

    <h1>HTML Images</h1>

    <h2>Local Images</h2>

    <div>
        <img src="images/nature.png" alt="Beautiful green nature landscape" width="300">
    </div>

    <div>
        <img src="images/city.jpeg" alt="Modern city skyline view" width="300">
    </div>

    <div>
        <img src="images/mountain.avif" alt="Snow covered mountain view" title="This is a mountain image" width="300">
    </div>

    <h2>External Image</h2>

    <div>
        <img src="https://images.unsplash.com/photo-1503023345310-bd7c1de61c7d"
            alt="Sample external scenic image from Unsplash" width="300">
    </div>

</body>

</html>
